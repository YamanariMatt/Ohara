<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários | Ohara</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Ohara">
      <span class="brand-mark">OH</span>
      <span>Ohara</span>
    </a>
    <nav class="nav-menu" aria-label="Menu principal">
      <a href="index.html">Busca</a>
      <a href="biblioteca.html">Biblioteca</a>
      <a class="active" href="usuarios.html">Usuários</a>
      <a href="emprestimos.html">Empréstimos</a>
      <a href="relatorios.html">Relatórios</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <div class="content-shell">
        <p class="eyebrow">Leitores</p>
        <h1>Usuários da biblioteca</h1>
      </div>
    </section>

    <section class="content-band">
      <div class="content-shell split-layout">
        <form class="form-panel" id="formUsuario">
          <h2>Cadastrar usuário</h2>
          <label for="nomeUsuario">Nome</label>
          <input id="nomeUsuario" name="nome" type="text" placeholder="Nome completo" required>
          <label for="emailUsuario">E-mail</label>
          <input id="emailUsuario" name="email" type="email" placeholder="leitor@exemplo.com">
          <button type="submit">Cadastrar</button>
        </form>

        <div class="list-panel">
          <div class="section-heading tight">
            <div>
              <p class="eyebrow">Cadastro</p>
              <h2>Usuários cadastrados</h2>
            </div>
          </div>
          <div class="message-area" id="mensagemUsuarios" role="status" aria-live="polite"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>E-mail</th>
                  <th>Criado em</th>
                </tr>
              </thead>
              <tbody id="listaUsuarios"></tbody>
            </table>
          </div>
          <div class="empty-state slim" id="estadoUsuarios" hidden>
            <h3>Nenhum usuário cadastrado</h3>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
