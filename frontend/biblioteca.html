<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Local | Biblioteca Vitoriana</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Biblioteca Vitoriana">
      <span class="brand-mark">BV</span>
      <span>Biblioteca Vitoriana</span>
    </a>
    <nav class="nav-menu" aria-label="Menu principal">
      <a href="index.html">Busca</a>
      <a class="active" href="biblioteca.html">Biblioteca</a>
      <a href="usuarios.html">Usuários</a>
      <a href="emprestimos.html">Empréstimos</a>
      <a href="relatorios.html">Relatórios</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <div class="content-shell">
        <p class="eyebrow">Acervo local</p>
        <h1>Livros salvos</h1>
      </div>
    </section>

    <section class="content-band">
      <div class="content-shell">
        <form class="toolbar" id="formFiltroBiblioteca">
          <label class="sr-only" for="buscaLocal">Filtrar livros salvos</label>
          <input id="buscaLocal" type="search" placeholder="Filtrar por título ou autor" autocomplete="off">
          <button type="submit">Filtrar</button>
          <button class="button-secondary" type="button" id="btnDisponiveis">Disponíveis</button>
          <button class="button-ghost" type="button" id="btnTodos">Todos</button>
        </form>

        <div class="message-area" id="mensagemBiblioteca" role="status" aria-live="polite"></div>
        <div class="book-grid compact-grid" id="listaBiblioteca"></div>
        <div class="empty-state" id="estadoBiblioteca" hidden>
          <h3>Nenhum livro encontrado</h3>
          <p>Salve obras pela busca principal para formar o acervo local.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/biblioteca.js"></script>
</body>
</html>
