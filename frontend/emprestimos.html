<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empréstimos | Ohara</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Ohara">
      <span class="brand-mark">OH</span>
      <span>Ohara</span>
    </a>
    <nav class="nav-menu" aria-label="Menu principal">
      <a href="index.html">Busca</a>
      <a href="biblioteca.html">Biblioteca</a>
      <a href="usuarios.html">Usuários</a>
      <a class="active" href="emprestimos.html">Empréstimos</a>
      <a href="relatorios.html">Relatórios</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <div class="content-shell">
        <p class="eyebrow">Circulação</p>
        <h1>Empréstimos</h1>
      </div>
    </section>

    <section class="content-band">
      <div class="content-shell split-layout">
        <form class="form-panel" id="formEmprestimo">
          <h2>Novo empréstimo</h2>
          <label for="livroDisponivel">Livro disponível</label>
          <select id="livroDisponivel" name="livro_id" required></select>
          <label for="usuarioEmprestimo">Usuário</label>
          <select id="usuarioEmprestimo" name="usuario_id" required></select>
          <button type="submit">Emprestar</button>
        </form>

        <div class="list-panel">
          <div class="section-heading tight">
            <div>
              <p class="eyebrow">Registros</p>
              <h2>Empréstimos ativos</h2>
            </div>
            <button class="button-ghost" type="button" id="btnAtualizarEmprestimos">Atualizar</button>
          </div>
          <div class="message-area" id="mensagemEmprestimos" role="status" aria-live="polite"></div>
          <div class="loan-list" id="listaEmprestimos"></div>
          <div class="empty-state slim" id="estadoEmprestimos" hidden>
            <h3>Nenhum empréstimo ativo</h3>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/emprestimos.js"></script>
</body>
</html>
